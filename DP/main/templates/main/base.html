<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Система за видео наблюдение{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fb;
        }
        .navbar-brand {
            font-weight: 700;
        }
        .card-shadow {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            border: 0;
            border-radius: 16px;
        }
        .section-title {
            font-weight: 700;
            margin-bottom: 1rem;
        }
        .badge-status {
            font-size: 0.85rem;
            padding: 0.5rem 0.75rem;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">Video Surveillance</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}">Начало</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'camera_list' %}">Камери</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'motion_event_list' %}">Събития</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/api/cameras/" target="_blank">API</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-4">
    {% if messages %}
        <div class="mb-3">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        </div>
    {% endif %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
